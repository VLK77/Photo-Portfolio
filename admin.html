<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VK Admin — Upload Photo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e8e4dc;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    .logo {
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      color: #e8e4dc;
      margin-bottom: 2.5rem;
      opacity: 0.5;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #555;
      margin-bottom: 3rem;
      text-transform: uppercase;
    }

    /* Token screen */
    #token-screen, #upload-screen { display: none; }
    #token-screen.active, #upload-screen.active { display: block; }

    .field { margin-bottom: 1.8rem; }

    label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 0.6rem;
    }

    input[type="text"], input[type="password"], select {
      width: 100%;
      background: #111;
      border: 1px solid #222;
      color: #e8e4dc;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      padding: 0.85rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus { border-color: #444; }
    select { cursor: pointer; }
    select option { background: #111; }

    /* Drop zone */
    .dropzone {
      border: 1px dashed #333;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      margin-bottom: 1.8rem;
    }

    .dropzone:hover, .dropzone.drag-over {
      border-color: #666;
      background: #111;
    }

    .dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .dropzone-icon { font-size: 2rem; margin-bottom: 0.8rem; opacity: 0.4; }
    .dropzone-text { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: #555; }
    .dropzone-hint { font-size: 0.65rem; color: #333; margin-top: 0.4rem; }

    .preview-wrap {
      display: none;
      margin-bottom: 1.8rem;
      position: relative;
    }

    .preview-wrap img {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      display: block;
    }

    .preview-name {
      font-size: 0.65rem;
      color: #444;
      padding: 0.5rem 0;
      letter-spacing: 0.05em;
    }

    .remove-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: #0a0a0a;
      border: 1px solid #333;
      color: #e8e4dc;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      letter-spacing: 0.05em;
    }

    .btn {
      width: 100%;
      background: transparent;
      border: 1px solid #e8e4dc;
      color: #e8e4dc;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 1rem 1.5rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn:hover { background: #e8e4dc; color: #0a0a0a; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn:disabled:hover { background: transparent; color: #e8e4dc; }

    /* Progress */
    .progress { display: none; margin-top: 1.5rem; }
    .progress-bar-wrap { background: #111; height: 2px; margin-bottom: 0.6rem; }
    .progress-bar { height: 100%; background: #e8e4dc; width: 0%; transition: width 0.3s; }
    .progress-text { font-size: 0.65rem; letter-spacing: 0.1em; color: #555; text-transform: uppercase; }

    /* Success */
    .success-msg {
      display: none;
      margin-top: 1.5rem;
      padding: 1rem;
      border: 1px solid #2a4a2a;
      background: #0f1f0f;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: #5a9a5a;
    }

    .error-msg {
      display: none;
      margin-top: 1.5rem;
      padding: 1rem;
      border: 1px solid #4a1a1a;
      background: #1a0a0a;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: #c04040;
    }

    .link {
      display: inline-block;
      margin-top: 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: #444;
      text-decoration: none;
      text-transform: uppercase;
    }
    .link:hover { color: #888; }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">VK / ADMIN</div>

  <!-- Token Screen -->
  <div id="token-screen" class="active">
    <h1>Sign in</h1>
    <p class="subtitle">GitHub token required</p>

    <div class="field">
      <label>GitHub Personal Access Token</label>
      <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx">
    </div>

    <button class="btn" onclick="saveToken()">Continue →</button>

    <div class="error-msg" id="token-error">Invalid token or no access to repository.</div>
  </div>

  <!-- Upload Screen -->
  <div id="upload-screen">
    <h1>Add Photo</h1>
    <p class="subtitle">Upload to gallery</p>

    <!-- Drop Zone -->
    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon">↑</div>
      <div class="dropzone-text">Drop photo here</div>
      <div class="dropzone-hint">JPG, PNG — any size</div>
      <input type="file" id="file-input" accept="image/*" onchange="handleFile(this.files[0])">
    </div>

    <!-- Preview -->
    <div class="preview-wrap" id="preview-wrap">
      <img id="preview-img" src="" alt="">
      <button class="remove-btn" onclick="removeFile()">✕ Remove</button>
      <div class="preview-name" id="preview-name"></div>
    </div>

    <div class="field">
      <label>Title</label>
      <input type="text" id="title-input" placeholder="e.g. Basilisk">
    </div>

    <div class="field">
      <label>Category</label>
      <select id="cat-input">
        <option value="street">Street</option>
        <option value="nature">Nature</option>
        <option value="animals" selected>Animals</option>
        <option value="aerial">Aerial</option>
        <option value="architecture">Architecture</option>
      </select>
    </div>

    <div class="field">
      <label>Subtitle <span style="color:#333">(optional)</span></label>
      <input type="text" id="sub-input" placeholder="e.g. Close-up · Praha">
    </div>

    <button class="btn" id="upload-btn" onclick="uploadPhoto()" disabled>Upload to Gallery →</button>

    <div class="progress" id="progress">
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="progress-text" id="progress-text">Preparing...</div>
    </div>

    <div class="success-msg" id="success-msg"></div>
    <div class="error-msg" id="upload-error"></div>

    <a href="/" class="link">← Back to portfolio</a>
  </div>
</div>

<script>
  const REPO = 'VLK77/Photo-Portfolio';
  const BRANCH = 'main';
  let selectedFile = null;
  let detectedRatio = '3/4';

  // ── Token ──────────────────────────────────────────────
  function saveToken() {
    const t = document.getElementById('token-input').value.trim();
    if (!t) return;
    sessionStorage.setItem('gh_token', t);
    verifyToken(t);
  }

  async function verifyToken(token) {
    try {
      const r = await fetch(`https://api.github.com/repos/${REPO}`, {
        headers: { Authorization: `token ${token}` }
      });
      if (!r.ok) throw new Error();
      document.getElementById('token-screen').classList.remove('active');
      document.getElementById('upload-screen').classList.add('active');
    } catch {
      document.getElementById('token-error').style.display = 'block';
      sessionStorage.removeItem('gh_token');
    }
  }

  // Auto-login if token exists
  window.addEventListener('DOMContentLoaded', () => {
    const t = sessionStorage.getItem('gh_token');
    if (t) verifyToken(t);

    // Drag & drop
    const dz = document.getElementById('dropzone');
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
    dz.addEventListener('drop', e => {
      e.preventDefault();
      dz.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });

    // Enter key on token
    document.getElementById('token-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveToken();
    });
  });

  // ── File handling ──────────────────────────────────────
  function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    selectedFile = file;

    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('preview-img');
      img.src = e.target.result;
      img.onload = () => {
        const w = img.naturalWidth, h = img.naturalHeight;
        const r = w / h;
        if (r > 1.2) detectedRatio = '4/3';
        else if (r < 0.85) detectedRatio = '3/4';
        else detectedRatio = '1/1';
      };
      document.getElementById('preview-name').textContent = file.name + ' · ' + (file.size / 1024 / 1024).toFixed(1) + ' MB';
      document.getElementById('preview-wrap').style.display = 'block';
      document.getElementById('dropzone').style.display = 'none';
      document.getElementById('upload-btn').disabled = false;

      // Auto-fill title from filename
      const nameNoExt = file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
      if (!document.getElementById('title-input').value)
        document.getElementById('title-input').value = nameNoExt;
    };
    reader.readAsDataURL(file);
  }

  function removeFile() {
    selectedFile = null;
    document.getElementById('preview-wrap').style.display = 'none';
    document.getElementById('dropzone').style.display = 'block';
    document.getElementById('upload-btn').disabled = true;
    document.getElementById('file-input').value = '';
  }

  // ── Upload ──────────────────────────────────────────────
  async function uploadPhoto() {
    const token = sessionStorage.getItem('gh_token');
    const title = document.getElementById('title-input').value.trim() || selectedFile.name;
    const cat = document.getElementById('cat-input').value;
    const sub = document.getElementById('sub-input').value.trim() ||
      (cat.charAt(0).toUpperCase() + cat.slice(1)) + ' · Praha';
    const filename = selectedFile.name;

    setProgress(true);
    setStep('Uploading photo...', 20);

    try {
      // 1. Upload image
      const imgB64 = await fileToBase64(selectedFile);
      const imgRes = await ghPut(`contents/${encodeURIComponent(filename)}`, {
        message: `Add photo: ${filename}`,
        content: imgB64
      }, token);
      if (!imgRes.ok) {
        const err = await imgRes.json();
        throw new Error(err.message || 'Image upload failed');
      }

      setStep('Reading gallery...', 50);

      // 2. Get index.html
      const htmlRes = await fetch(`https://api.github.com/repos/${REPO}/contents/index.html?ref=${BRANCH}`, {
        headers: { Authorization: `token ${token}` }
      });
      const htmlData = await htmlRes.json();
      let html = atob(htmlData.content.replace(/\n/g, ''));

      setStep('Adding to gallery...', 70);

      // 3. Build new gallery item
      const newItem = `
    <div class="gallery-item fade-in" data-cat="${cat}" style="aspect-ratio:${detectedRatio};">
      <img src="${filename.replace(/ /g, '%20')}" alt="${title}" style="width:100%;height:100%;object-fit:cover;display:block;" draggable="false" oncontextmenu="return false">
      <div class="gallery-item-label"><span>${title}</span><small>${sub}</small></div>
    </div>`;

      // Insert before gallery closing tags
      const marker = '  </div>\n</section>\n<section id="about">';
      if (!html.includes(marker)) throw new Error('Could not find gallery section in HTML');
      html = html.replace(marker, newItem + '\n\n' + marker);

      setStep('Saving HTML...', 85);

      // 4. Push index.html
      const updatedB64 = btoa(unescape(encodeURIComponent(html)));
      const pushRes = await ghPut('contents/index.html', {
        message: `Add ${title} to ${cat} gallery`,
        content: updatedB64,
        sha: htmlData.sha
      }, token);

      if (!pushRes.ok) {
        const err = await pushRes.json();
        throw new Error(err.message || 'HTML update failed');
      }

      setStep('Done!', 100);
      document.getElementById('progress').style.display = 'none';

      const msg = document.getElementById('success-msg');
      msg.style.display = 'block';
      msg.innerHTML = `✓ "${title}" added to <strong>${cat}</strong> gallery.<br><span style="color:#3a7a3a;font-size:0.65rem;">GitHub Pages updates in ~1 min → <a href="https://vlakuba.com" target="_blank" style="color:#5a9a5a;">vlakuba.com</a></span>`;

      removeFile();
      document.getElementById('title-input').value = '';
      document.getElementById('sub-input').value = '';
      document.getElementById('upload-btn').disabled = true;

    } catch (err) {
      setProgress(false);
      const errEl = document.getElementById('upload-error');
      errEl.style.display = 'block';
      errEl.textContent = '✕ Error: ' + err.message;
    }
  }

  // ── Helpers ─────────────────────────────────────────────
  function ghPut(path, body, token) {
    return fetch(`https://api.github.com/repos/${REPO}/${path}`, {
      method: 'PUT',
      headers: {
        Authorization: `token ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ ...body, branch: BRANCH })
    });
  }

  function fileToBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  function setProgress(show) {
    document.getElementById('progress').style.display = show ? 'block' : 'none';
    document.getElementById('upload-btn').disabled = show;
    document.getElementById('upload-error').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';
  }

  function setStep(text, pct) {
    document.getElementById('progress-text').textContent = text;
    document.getElementById('progress-bar').style.width = pct + '%';
  }
</script>
</body>
</html>
